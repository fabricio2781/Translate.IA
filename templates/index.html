<!DOCTYPE html> 
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/icone.png') }}">

    <title>Tela de login</title>
</head>

<body>
  <main class="container">
    <h1>Bem-vindo ao Translate.Ai</h1>

    
    <form method="POST">

        <h1>Login</h1>
        
        <div class="input-box">
      
            <input name="email" placeholder="Usuário" type="email" required>
            <i class='bx bx-user'></i>
        </div>

        <div class="input-box">
        
            <input name="senha" placeholder="Senha" type="password" required>
            <i class='bx bx-lock-alt'></i>
        </div>

        <div class="remember-forgot">
            <label>
                <input type="checkbox">
                Lembrar Senha
            </label>
            <a href="#">Esqueci a Senha</a>
        </div>

        <button type="submit" class="Login">Login</button>

        <div class="register-link">
            <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
        </div>

    </form>
  </main>
</body>
</html>
